services:
  db:
    image: postgres:15-alpine
    container_name: better_assignment_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: better_assignment
    ports:
      - "3200:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: better_assignment_backend
    restart: always
    ports:
      - "3201:3201"
    environment:
      FLASK_ENV: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql://postgres:postgres@db:5432/better_assignment
      PORT: "3201"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: better_assignment_frontend
    restart: always
    ports:
      - "3202:3202"
    environment:
      VITE_API_URL: http://localhost:3201
    depends_on:
      - backend

volumes:
  postgres_data:
